<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNote - Mon Suivi</title>
    <!-- Google Fonts for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #F5F7FA;
            --accent-color: #FF6B6B;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --white: #FFFFFF;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }

        body {
            background-color: var(--secondary-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-weight: 600;
            color: var(--primary-color);
            margin: 0;
            font-size: 2rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* Form Styles */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #E1E8ED;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button.primary-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.primary-btn:hover {
            background-color: #357ABD;
        }

        /* Stats / Last Entry */
        .stat-card {
            text-align: center;
            background: linear-gradient(135deg, #6DD5FA 0%, #2980B9 100%);
            color: white;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-weight: 300;
            font-size: 1rem;
            opacity: 0.9;
        }

        .last-mood-display {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .last-mood-details {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* History List */
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #F0F0F0;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            font-size: 1.5rem;
            margin-right: 15px;
            background: #EFF6FF;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .history-content {
            flex: 1;
        }

        .history-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .history-meta {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .history-date {
            font-size: 0.75rem;
            color: #BDC3C7;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* Delete Button */
        .delete-btn {
            background: none;
            border: none;
            color: #E74C3C;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
            opacity: 0.5;
            transition: opacity 0.2s;
            padding: 5px;
        }

        .delete-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>

    <header>
        <h1>CareNote</h1>
        <div class="subtitle">Votre compagnon de bien-être quotidien</div>
    </header>

    <div class="container">

        <!-- Stats / Last Mood -->
        <div class="card stat-card" id="lastEntryCard" style="display: none;">
            <h3>Dernière humeur</h3>
            <div class="last-mood-display" id="lastMoodDisplay"></div>
            <div class="last-mood-details" id="lastMoodDetails"></div>
        </div>

        <!-- NEW: General Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalEntries">0</div>
                <div class="stat-label">Notes totales</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="topMood">-</div>
                <div class="stat-label">Humeur dominante</div>
            </div>
        </div>

        <!-- Add Mood Form -->
        <div class="card">
            <h2 style="margin-top: 0; font-size: 1.2rem; margin-bottom: 20px;">Comment allez-vous ?</h2>
            <form id="moodForm">
                <label for="moodSelect">Humeur</label>
                <select id="moodSelect" required>
                    <option value="" disabled selected>Sélectionnez...</option>
                    <option value="😄 Heureux">😄 Heureux</option>
                    <option value="🙂 Bien">🙂 Bien</option>
                    <option value="😐 Normal">😐 Normal</option>
                    <option value="😫 Fatigué">😫 Fatigué</option>
                    <option value="😢 Triste">😢 Triste</option>
                    <option value="😡 En colère">😡 En colère</option>
                </select>

                <label for="categorySelect">Catégorie</label>
                <select id="categorySelect">
                    <option value="Santé">Santé</option>
                    <option value="Relations">Relations</option>
                    <option value="Travail">Travail</option>
                    <option value="Famille">Famille</option>
                    <option value="Loisirs">Loisirs</option>
                    <option value="Autre">Autre</option>
                </select>

                <label for="noteInput">Note (optionnel)</label>
                <input type="text" id="noteInput" placeholder="Ex: J'ai bien dormi..." autocomplete="off">

                <button type="submit" class="primary-btn">Enregistrer</button>
            </form>
        </div>

        <!-- History -->
        <div class="card">
            <h2 style="margin-top: 0; font-size: 1.2rem; margin-bottom: 15px;">Historique récent</h2>
            <div id="historyList" class="history-list">
                <!-- Entries will be injected here -->
                <div style="text-align: center; color: var(--text-light); padding: 20px;">Aucune entrée pour le moment
                </div>
            </div>
        </div>

    </div>

    <script>
        // Sample Data for Initialization
        const SAMPLE_DATA = [
            {
                humeur: "😄 Heureux",
                categorie: "Relations",
                note: "Journée super agréable",
                date: "16/02/2026"
            },
            {
                humeur: "🙂 Bien",
                categorie: "Santé",
                note: "J’ai bien dormi",
                date: "16/02/2026"
            },
            {
                humeur: "😐 Normal",
                categorie: "Travail",
                note: "Rien de spécial",
                date: "15/02/2026"
            }
        ];

        // Constants
        const STORAGE_KEY = 'carenote_entries';

        // State
        let entries = [];

        // Initialization
        function init() {
            const storedData = localStorage.getItem(STORAGE_KEY);

            if (storedData) {
                entries = JSON.parse(storedData);
            } else {
                // First time load: use sample data
                entries = [...SAMPLE_DATA];
                saveEntries();
            }

            render();
        }

        // Save to LocalStorage
        function saveEntries() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        // NEW: Delete Entry
        function deleteEntry(index) {
            if (confirm('Voulez-vous vraiment supprimer cette note ?')) {
                entries.splice(index, 1);
                saveEntries();
                render();
            }
        }

        // Helper: Calculate Top Mood
        function getTopMood() {
            if (entries.length === 0) return '-';

            const moodCounts = {};
            entries.forEach(entry => {
                const mood = entry.humeur;
                moodCounts[mood] = (moodCounts[mood] || 0) + 1;
            });

            let maxCount = 0;
            let topMood = '-';

            for (const mood in moodCounts) {
                if (moodCounts[mood] > maxCount) {
                    maxCount = moodCounts[mood];
                    topMood = mood;
                }
            }
            // Return just the emoji if desired, or full string. Let's do emoji
            const [emoji] = topMood.split(' ');
            return emoji;
        }

        // Render UI
        function render() {
            const historyContainer = document.getElementById('historyList');
            const lastEntryCard = document.getElementById('lastEntryCard');
            const lastMoodDisplay = document.getElementById('lastMoodDisplay');
            const lastMoodDetails = document.getElementById('lastMoodDetails');
            const totalEntriesEl = document.getElementById('totalEntries');
            const topMoodEl = document.getElementById('topMood');

            // Update Stats
            totalEntriesEl.textContent = entries.length;
            topMoodEl.textContent = getTopMood();

            // Clear list
            historyContainer.innerHTML = '';

            if (entries.length === 0) {
                historyContainer.innerHTML = '<div style="text-align: center; color: var(--text-light); padding: 20px;">Aucune entrée pour le moment</div>';
                lastEntryCard.style.display = 'none';
                return;
            }

            // Show Last Entry Card
            const lastEntry = entries[0]; // Assuming newest first
            lastEntryCard.style.display = 'block';

            // Extract emoji and text
            const [emoji, ...textParts] = lastEntry.humeur.split(' ');
            const moodText = textParts.join(' ');

            lastMoodDisplay.textContent = `${emoji} ${moodText || ''}`;
            lastMoodDetails.textContent = `${lastEntry.categorie} • ${lastEntry.date}`;

            // Render History List
            entries.forEach((entry, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';

                const [entryEmoji] = entry.humeur.split(' ');

                item.innerHTML = `
                    <div class="history-icon">${entryEmoji}</div>
                    <div class="history-content">
                        <div class="history-title">${entry.humeur.replace(entryEmoji, '').trim()}</div>
                        <div class="history-meta">${entry.categorie} ${entry.note ? ' - ' + entry.note : ''}</div>
                    </div>
                    <div class="history-date">${entry.date}</div>
                    <button class="delete-btn" onclick="deleteEntry(${index})" title="Supprimer">&times;</button>
                `;

                historyContainer.appendChild(item);
            });
        }

        // Handle Form Submit
        document.getElementById('moodForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const moodSelect = document.getElementById('moodSelect');
            const categorySelect = document.getElementById('categorySelect');
            const noteInput = document.getElementById('noteInput');

            if (!moodSelect.value) return;

            const today = new Date();
            const dateStr = `${today.getDate().toString().padStart(2, '0')}/${(today.getMonth() + 1).toString().padStart(2, '0')}/${today.getFullYear()}`;

            const newEntry = {
                humeur: moodSelect.value,
                categorie: categorySelect.value,
                note: noteInput.value,
                date: dateStr
            };

            // Add to beginning of array
            entries.unshift(newEntry);

            saveEntries();
            render();

            // Reset Form (keep category maybe? nah, reset all for now)
            moodSelect.value = "";
            noteInput.value = "";
            // categorySelect.value defaults to first option or keeps selection depending on browser, let's reset to first
            categorySelect.selectedIndex = 0;
        });

        // Run
        init();
    </script>
</body>

</html>
